version: '3.8'

services:
  neo4j:
    image: neo4j:5-community
    container_name: primekg-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser (HTTP)
      - "7687:7687"   # Bolt protocol
    environment:
      - NEO4J_AUTH=neo4j/primekg_benchmark
      # Memory settings for ~130K nodes + 4M edges
      - NEO4J_server_memory_heap_initial__size=1G
      - NEO4J_server_memory_heap_max__size=2G
      - NEO4J_server_memory_pagecache_size=1G
      # Allow CSV import from local file system
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      # Increase transaction timeout for large imports
      - NEO4J_dbms_transaction_timeout=600s
    volumes:
      - ./neo4j_data:/data
      - ./neo4j_logs:/logs
    restart: unless-stopped
